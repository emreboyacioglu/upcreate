# Örnek: /etc/nginx/sites-available/upcreate
# certbot sonrası ssl_certificate satırları eklenir.

upstream upcreate_landing {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream upcreate_panel {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream upcreate_api {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name upcreate.co www.upcreate.co;

    # ACME (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /api/v1/ {
        proxy_pass http://upcreate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Affiliate redirects
    location /r/ {
        proxy_pass http://upcreate_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Panel (Next basePath: /panel)
    location /panel {
        proxy_pass http://upcreate_panel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://upcreate_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

